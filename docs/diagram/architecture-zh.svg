<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">根织个人工程架构</title>
  <desc id="desc">一张浅色专业架构图。明确目标可选使用三档授权，再流经个人核心的修改、审查与指导闭环。下方展示可选证据、实验性记忆与已归档保障版。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#64748b"/>
    </marker>
    <style>
      text { font-family: "PingFang SC", "Microsoft YaHei", sans-serif; }
      .title { font-size: 34px; font-weight: 700; fill: #0f172a; }
      .subtitle { font-size: 17px; font-weight: 400; fill: #64748b; }
      .section { font-size: 16px; font-weight: 700; letter-spacing: 1px; }
      .card-title { font-size: 18px; font-weight: 700; fill: #0f172a; }
      .label { font-size: 14px; font-weight: 650; fill: #334155; }
      .small { font-size: 12px; font-weight: 450; fill: #64748b; }
      .node { font-size: 12px; font-weight: 650; fill: #1e293b; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="#f8fafc"/>
  <rect x="0" y="0" width="1600" height="142" fill="#ffffff"/>
  <rect x="80" y="48" width="10" height="58" rx="5" fill="#2563eb"/>
  <text x="112" y="72" class="section" fill="#2563eb">根织</text>
  <text x="112" y="108" class="title">个人工程架构</text>
  <text x="650" y="88" class="subtitle">明确目标 → 比例化工作流 → 可检查修改</text>

  <rect x="70" y="178" width="1460" height="370" rx="24" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
  <text x="100" y="216" class="section" fill="#64748b">主流程</text>

  <rect x="100" y="258" width="220" height="190" rx="18" fill="#eff6ff" stroke="#93c5fd" stroke-width="2"/>
  <circle cx="140" cy="300" r="18" fill="#2563eb"/>
  <path d="M132 300 L138 306 L149 293" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="170" y="306" class="card-title">明确目标</text>
  <rect x="126" y="336" width="168" height="38" rx="9" fill="#ffffff" stroke="#bfdbfe"/>
  <text x="210" y="360" text-anchor="middle" class="label">操作类型</text>
  <rect x="126" y="386" width="168" height="38" rx="9" fill="#ffffff" stroke="#bfdbfe"/>
  <text x="210" y="410" text-anchor="middle" class="label">预期作用范围</text>

  <path d="M320 353 L360 353" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrow)"/>

  <rect x="380" y="232" width="330" height="242" rx="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="406" y="270" class="card-title">授权模式</text>
  <rect x="406" y="292" width="278" height="46" rx="10" fill="#eff6ff" stroke="#93c5fd"/>
  <circle cx="430" cy="315" r="10" fill="#2563eb"/>
  <text x="450" y="312" class="label">本条命令</text>
  <text x="450" y="328" class="small">仅一次命令或动作</text>
  <rect x="406" y="350" width="278" height="46" rx="10" fill="#fff7ed" stroke="#fdba74"/>
  <circle cx="430" cy="373" r="10" fill="#f59e0b"/>
  <text x="450" y="370" class="label">普通权限</text>
  <text x="450" y="386" class="small">跨任务持久 · 仅非高危</text>
  <rect x="406" y="408" width="278" height="46" rx="10" fill="#fff1f2" stroke="#fda4af"/>
  <circle cx="430" cy="431" r="10" fill="#ef4444"/>
  <text x="450" y="428" class="label">所有权限</text>
  <text x="450" y="444" class="small">仅当前任务 · 包含高危</text>

  <path d="M710 353 L750 353" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrow)"/>

  <rect x="770" y="232" width="570" height="242" rx="18" fill="#ffffff" stroke="#c4b5fd" stroke-width="2"/>
  <text x="796" y="270" class="card-title">个人核心 · 修改 / 审查 / 指导</text>
  <path d="M815 353 L1297 353" stroke="#cbd5e1" stroke-width="4" stroke-linecap="round"/>

  <g>
    <rect x="794" y="310" width="78" height="86" rx="12" fill="#f8fafc" stroke="#cbd5e1"/>
    <circle cx="833" cy="334" r="13" fill="#e2e8f0"/>
    <path d="M827 334 L839 334" stroke="#64748b" stroke-width="2"/>
    <text x="833" y="375" text-anchor="middle" class="node">项目指导</text>

    <rect x="882" y="310" width="82" height="86" rx="12" fill="#eff6ff" stroke="#93c5fd"/>
    <circle cx="923" cy="334" r="13" fill="#2563eb"/>
    <circle cx="923" cy="334" r="4" fill="#ffffff"/>
    <text x="923" y="375" text-anchor="middle" class="node">检查</text>

    <rect x="974" y="310" width="88" height="86" rx="12" fill="#fff7ed" stroke="#fdba74"/>
    <circle cx="1018" cy="334" r="13" fill="#f59e0b"/>
    <path d="M1012 334 C1017 326 1024 327 1025 335 C1022 341 1015 342 1012 334 Z" fill="#ffffff"/>
    <text x="1018" y="375" text-anchor="middle" class="node">根因诊断</text>

    <rect x="1072" y="310" width="104" height="86" rx="12" fill="#f5f3ff" stroke="#c4b5fd"/>
    <circle cx="1124" cy="334" r="13" fill="#7c3aed"/>
    <path d="M1117 334 L1124 327 L1131 334 L1124 341 Z" fill="#ffffff"/>
    <text x="1124" y="369" text-anchor="middle" class="node">范围内</text>
    <text x="1124" y="385" text-anchor="middle" class="node">修改</text>

    <rect x="1186" y="310" width="66" height="86" rx="12" fill="#ecfdf5" stroke="#6ee7b7"/>
    <circle cx="1219" cy="334" r="13" fill="#059669"/>
    <path d="M1213 334 L1217 338 L1225 329" fill="none" stroke="#ffffff" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="1219" y="375" text-anchor="middle" class="node">验证</text>

    <rect x="1262" y="310" width="58" height="86" rx="12" fill="#ecfdf5" stroke="#6ee7b7"/>
    <circle cx="1291" cy="334" r="13" fill="#059669"/>
    <path d="M1284 330 L1298 330 M1284 335 L1298 335 M1284 340 L1294 340" stroke="#ffffff" stroke-width="1.8"/>
    <text x="1291" y="369" text-anchor="middle" class="node">审查</text>
    <text x="1291" y="385" text-anchor="middle" class="node">摘要</text>
  </g>
  <path d="M833 408 C833 448 923 448 923 408" fill="none" stroke="#94a3b8" stroke-width="2" stroke-dasharray="5 5" marker-end="url(#arrow)"/>
  <text x="1055" y="434" text-anchor="middle" class="small">证据 → 根因诊断 → 范围内修改 → 验证</text>

  <path d="M1340 353 L1380 353" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrow)"/>

  <rect x="1400" y="278" width="100" height="150" rx="18" fill="#eff6ff" stroke="#60a5fa" stroke-width="2"/>
  <circle cx="1450" cy="319" r="20" fill="#2563eb"/>
  <text x="1450" y="326" text-anchor="middle" font-size="20" font-weight="700" fill="#ffffff">查</text>
  <text x="1450" y="361" text-anchor="middle" class="label">可检查</text>
  <text x="1450" y="380" text-anchor="middle" class="label">修改</text>
  <text x="1450" y="406" text-anchor="middle" class="small">证据有界</text>

  <rect x="70" y="578" width="960" height="132" rx="20" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
  <text x="98" y="615" class="section" fill="#64748b">支持上下文</text>
  <rect x="98" y="636" width="205" height="46" rx="12" fill="#eff6ff"/>
  <text x="200" y="664" text-anchor="middle" class="label">项目指导</text>
  <rect x="318" y="636" width="205" height="46" rx="12" fill="#f5f3ff"/>
  <text x="420" y="656" text-anchor="middle" class="label">实验性记忆</text>
  <text x="420" y="674" text-anchor="middle" class="small">显式 · 建议式</text>
  <rect x="538" y="636" width="205" height="46" rx="12" fill="#fff7ed"/>
  <text x="640" y="664" text-anchor="middle" class="label">持久决策</text>
  <rect x="758" y="636" width="244" height="46" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-dasharray="6 5"/>
  <text x="880" y="656" text-anchor="middle" class="label">可选证据</text>
  <text x="880" y="674" text-anchor="middle" class="small">分析 · 基线 · 汇总</text>

  <rect x="1060" y="578" width="470" height="132" rx="20" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
  <text x="1088" y="615" class="section" fill="#64748b">交付层</text>
  <rect x="1088" y="636" width="180" height="46" rx="12" fill="#eff6ff"/>
  <text x="1178" y="656" text-anchor="middle" class="label">插件安装</text>
  <text x="1178" y="674" text-anchor="middle" class="small">仅技能</text>
  <rect x="1282" y="636" width="220" height="46" rx="12" fill="#f5f3ff"/>
  <text x="1392" y="656" text-anchor="middle" class="label">可选个人设置</text>
  <text x="1392" y="674" text-anchor="middle" class="small">指导 · 自主授权 · 临时上下文</text>

  <rect x="70" y="742" width="960" height="92" rx="18" fill="#eff6ff" stroke="#bfdbfe"/>
  <circle cx="108" cy="788" r="15" fill="#2563eb"/>
  <path d="M108 780 L108 783 M108 787 L108 797" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
  <text x="138" y="780" class="label">授权边界</text>
  <text x="138" y="804" class="small">全局指导管理模式与范围语义，平台约束始终优先。</text>

  <rect x="1060" y="742" width="470" height="92" rx="18" fill="#ffffff" stroke="#a78bfa" stroke-width="2" stroke-dasharray="8 6"/>
  <text x="1088" y="780" class="card-title">已归档保障版</text>
  <text x="1088" y="805" class="small">未维护快照 · 可恢复源码</text>
</svg>
