name: Codex compatibility probe

on:
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: codex-compatibility-${{ github.ref }}
  cancel-in-progress: true

jobs:
  latest-cli:
    name: Latest Codex CLI (informational)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"

      - name: Install latest Codex CLI
        run: npm install --global @openai/codex@latest

      - name: Record probed version
        run: codex --version

      - name: Run repository contracts with latest Codex
        run: make check

      - name: Run offline plugin compatibility smoke
        run: make compatibility-smoke
