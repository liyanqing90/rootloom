      <stop stop-color="#17162B"/>
      <stop offset="0.58" stop-color="#211D3D"/>
      <stop offset="1" stop-color="#0C2D30"/>
    </linearGradient>
    <linearGradient id="fiber" x1="78" y1="218" x2="181" y2="31" gradientUnits="userSpaceOnUse">
