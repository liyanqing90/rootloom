    <path d="M130 59C119 52 107 47 91 43M132 58C132 47 132 40 130 31M133 59C146 52 157 47 170 43" stroke-width="3"/>
    <path d="M126 191C111 203 99 208 83 219M128 193C128 207 128 214 128 224M130 191C143 202 155 208 174 217" stroke-width="3"/>
