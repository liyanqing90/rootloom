<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">Rootloom icon</title>
  <desc id="desc">A continuous fiber grows from evidence roots, passes through five capability frames, and branches toward a verified result.</desc>
  <defs>
