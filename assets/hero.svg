<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Rootloom overview</title>
  <desc id="desc">Five selectable capability levels grow from bundled Skills to guidance, engineering safety, optional delegation control, and deterministic high-assurance delivery.</desc>
  <defs>
    <linearGradient id="canvas" x1="70" y1="34" x2="1523" y2="864" gradientUnits="userSpaceOnUse">
      <stop stop-color="#121127"/>
      <stop offset="0.5" stop-color="#221D45"/>
      <stop offset="1" stop-color="#0D3032"/>
    </linearGradient>
    <linearGradient id="violet" x1="554" y1="208" x2="1069" y2="682" gradientUnits="userSpaceOnUse">
      <stop stop-color="#B6ABFF"/>
      <stop offset="0.5" stop-color="#7667FF"/>
      <stop offset="1" stop-color="#55D6AE"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#2A254E"/>
      <stop offset="1" stop-color="#1D1A37"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientTransform="translate(830 466) rotate(90) scale(322)" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7A6BFF" stop-opacity=".20"/>
      <stop offset="0.6" stop-color="#55D6AE" stop-opacity=".08"/>
      <stop offset="1" stop-color="#55D6AE" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="46" height="46" patternUnits="userSpaceOnUse">
      <path d="M46 0H0V46" fill="none" stroke="#FFFFFF" stroke-opacity=".035"/>
    </pattern>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="180%">
      <feDropShadow dx="0" dy="22" stdDeviation="28" flood-color="#05040B" flood-opacity=".38"/>
    </filter>
    <filter id="softGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="7" result="g"/>
      <feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0l10 5-10 5z" fill="#A99BFF"/>
    </marker>
  </defs>
  <rect width="1600" height="900" rx="48" fill="url(#canvas)"/>
  <rect width="1600" height="900" rx="48" fill="url(#grid)"/>
  <circle cx="830" cy="466" r="322" fill="url(#glow)"/>

  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <text x="96" y="105" fill="#B9B2D4" font-size="18" font-weight="700" letter-spacing="4">ROOTLOOM · CAPABILITY MAP</text>
    <text x="96" y="166" fill="#FFFFFF" font-size="50" font-weight="780" letter-spacing="-1.6">Five layers. Install only what you need.</text>
    <text x="96" y="207" fill="#AAA3C2" font-size="22">From lean guidance to deterministic delivery.</text>

    <g filter="url(#shadow)">
      <rect x="82" y="292" width="356" height="385" rx="28" fill="url(#card)" stroke="#494170" stroke-width="2"/>
    </g>
    <text x="120" y="343" fill="#F7F5FF" font-size="20" font-weight="750">Context, kept local</text>
    <text x="120" y="370" fill="#9E97B7" font-size="14">facts point to terrain; they do not copy it</text>
    <g transform="translate(120 408)">
      <rect width="280" height="76" rx="17" fill="#302A59"/>
      <rect x="18" y="17" width="42" height="42" rx="12" fill="#7667FF"/>
      <path d="M30 29h18M30 38h14M30 47h17" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round"/>
      <text x="76" y="34" fill="#F4F1FF" font-size="16" font-weight="700">Global AGENTS.md</text>
      <text x="76" y="56" fill="#B9B2D4" font-size="12">authority · autonomy · routing</text>
      <g transform="translate(0 92)">
        <rect width="280" height="76" rx="17" fill="#2A3155"/>
        <rect x="18" y="17" width="42" height="42" rx="12" fill="#39B98F"/>
        <path d="M28 30h22M28 39h17M28 48h20" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round"/>
        <text x="76" y="34" fill="#F4F1FF" font-size="16" font-weight="700">Project AGENTS.md</text>
        <text x="76" y="56" fill="#B9B2D4" font-size="12">commands · map · invariants</text>
      </g>
      <g transform="translate(0 184)">
        <rect width="280" height="76" rx="17" fill="#2D2949"/>
        <circle cx="39" cy="38" r="21" fill="#FFB45D"/>
        <path d="M29 38h20M39 28v20" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round"/>
        <text x="76" y="34" fill="#F4F1FF" font-size="16" font-weight="700">Repository truth</text>
        <text x="76" y="56" fill="#B9B2D4" font-size="12">source · schemas · tests · CI</text>
      </g>
    </g>

    <path d="M456 483H526" fill="none" stroke="#A99BFF" stroke-width="4" stroke-dasharray="4 10" marker-end="url(#arrow)"/>

    <circle cx="838" cy="478" r="238" fill="none" stroke="#A99BFF" stroke-opacity=".28" stroke-width="2" stroke-dasharray="5 12"/>
    <circle cx="838" cy="478" r="158" fill="#211D42" stroke="#5A5187" stroke-width="2"/>
    <circle cx="838" cy="478" r="123" fill="#F8F7FC" filter="url(#shadow)"/>
    <text x="838" y="447" text-anchor="middle" fill="#302A55" font-size="16" font-weight="750" letter-spacing="2">ONE COHERENT</text>
    <text x="838" y="493" text-anchor="middle" fill="#211D3D" font-size="35" font-weight="800">Engineering</text>
    <text x="838" y="533" text-anchor="middle" fill="#211D3D" font-size="35" font-weight="800">System</text>
    <rect x="768" y="558" width="140" height="30" rx="15" fill="#E8F7F1"/>
    <text x="838" y="578" text-anchor="middle" fill="#278C6B" font-size="11" font-weight="750">EVIDENCE → PROOF</text>

    <g font-size="14" font-weight="750" text-anchor="middle">
      <g transform="translate(838 238)"><circle r="46" fill="#302A59" stroke="#8F83F8" stroke-width="2"/><text y="5" fill="#FFFFFF">Skills</text></g>
      <g transform="translate(1048 356)"><circle r="46" fill="#342A4D" stroke="#FFB45D" stroke-width="2"/><text y="5" fill="#FFFFFF">Agents</text></g>
      <g transform="translate(1048 600)"><circle r="46" fill="#243E42" stroke="#55D6AE" stroke-width="2"/><text y="5" fill="#FFFFFF">Runner</text></g>
      <g transform="translate(838 718)"><circle r="46" fill="#243E42" stroke="#55D6AE" stroke-width="2"/><text y="5" fill="#FFFFFF">CI</text></g>
      <g transform="translate(628 600)"><circle r="46" fill="#42263E" stroke="#FF718A" stroke-width="2"/><text y="5" fill="#FFFFFF">Hooks</text></g>
      <g transform="translate(628 356)"><circle r="46" fill="#302A59" stroke="#8F83F8" stroke-width="2"/><text y="5" fill="#FFFFFF">Rules</text></g>
    </g>
    <g fill="#B9B2D4" font-size="10" font-weight="650" text-anchor="middle" letter-spacing="1">
      <text x="838" y="302">WORKFLOW</text><text x="990" y="412">MODEL ROUTING</text><text x="992" y="560">HARD STAGES</text>
      <text x="838" y="655">EXECUTABLE GATE</text><text x="683" y="560">LIFECYCLE</text><text x="682" y="412">COMMAND POLICY</text>
    </g>
    <g filter="url(#shadow)">
      <rect x="1196" y="294" width="322" height="383" rx="28" fill="#F8F7FC"/>
    </g>
    <rect x="1230" y="330" width="66" height="66" rx="18" fill="#211D43"/>
    <path d="M1248 362l10 10 21-25" fill="none" stroke="#62E0B9" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="1315" y="358" fill="#211D3D" font-size="21" font-weight="790">Verified change</text>
    <text x="1315" y="384" fill="#746E87" font-size="13">not a model completion claim</text>
    <g transform="translate(1230 435)">
      <text x="0" y="0" fill="#302A55" font-size="13" font-weight="750">DIAGNOSED</text>
      <rect y="17" width="244" height="9" rx="4.5" fill="#D5D1E2"/><rect y="17" width="196" height="9" rx="4.5" fill="#8C7EFF"/>
      <text x="0" y="70" fill="#302A55" font-size="13" font-weight="750">SCOPED</text>
      <rect y="87" width="244" height="9" rx="4.5" fill="#D5D1E2"/><rect y="87" width="222" height="9" rx="4.5" fill="#FFB45D"/>
      <text x="0" y="140" fill="#302A55" font-size="13" font-weight="750">TESTED</text>
      <rect y="157" width="244" height="9" rx="4.5" fill="#D5D1E2"/><rect y="157" width="232" height="9" rx="4.5" fill="#55D6AE"/>
      <text x="0" y="210" fill="#302A55" font-size="13" font-weight="750">REVIEWED</text>
      <rect y="227" width="244" height="9" rx="4.5" fill="#D5D1E2"/><rect y="227" width="218" height="9" rx="4.5" fill="#55D6AE"/>
    </g>

    <g font-size="14" font-weight="700">
      <rect x="96" y="778" width="228" height="46" rx="23" fill="#2A254E" stroke="#514A78"/><text x="210" y="807" text-anchor="middle" fill="#D8D3E9">Capability-level setup</text>
      <rect x="340" y="778" width="224" height="46" rx="23" fill="#2A254E" stroke="#514A78"/><text x="452" y="807" text-anchor="middle" fill="#D8D3E9">Automatic project context</text>
      <rect x="580" y="778" width="214" height="46" rx="23" fill="#2A254E" stroke="#514A78"/><text x="687" y="807" text-anchor="middle" fill="#D8D3E9">Optional delegation</text>
      <rect x="810" y="778" width="206" height="46" rx="23" fill="#2A254E" stroke="#514A78"/><text x="913" y="807" text-anchor="middle" fill="#D8D3E9">Commit ≠ publication</text>
      <rect x="1032" y="778" width="232" height="46" rx="23" fill="#2A254E" stroke="#514A78"/><text x="1148" y="807" text-anchor="middle" fill="#D8D3E9">Honest enforcement limits</text>
    </g>
  </g>
</svg>
